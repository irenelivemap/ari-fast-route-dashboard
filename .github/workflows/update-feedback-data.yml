name: Update feedback data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update-feedback-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Fetch latest benchmark feedback
        run: |
          mkdir -p data
          curl --fail --location --silent --show-error \
            "https://tbt-routing.paas.livemap.sh/api/v1/field/feedback" \
            --output data/feedback.jsonl

      - name: Commit changes
        run: |
          if git diff --quiet -- data/feedback.jsonl; then
            echo "No data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/feedback.jsonl
          git commit -m "Update benchmark feedback data"
          git push
